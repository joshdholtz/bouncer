conference:
  name: "My Conference"
  code_of_conduct_url: "https://myconference.com/code-of-conduct"
  instructions_channel: "instructions"

commands:
  - name: join_2027
    description: "Join 2027 conference channels"
    verify:
      provider: tito
      slug: "my-conference"
      year: "2027"
      # Map release title substrings to ticket types (case-insensitive)
      release_types:
        stream: "Live Streaming"    # release title substring → assigns stream role instead of default
        speaker: "Speaker"          # special: sets is_speaker flag (additive, not a primary type)
    roles:
      default: "ATTENDEE_ROLE_ID"
      stream: "STREAM_ROLE_ID"      # assigned when ticket type is stream
      speaker: "SPEAKER_ROLE_ID"   # assigned in addition to primary role when is_speaker

  - name: join_2026
    description: "Join 2026 conference channels"
    verify:
      provider: tito
      slug: "my-conference"
      year: "2026"
      release_types:
        stream: "Live Streaming"
        speaker: "Speaker"
    roles:
      default: "ATTENDEE_ROLE_ID_2026"
      stream: "STREAM_ROLE_ID_2026"
      speaker: "SPEAKER_ROLE_ID_2026"
