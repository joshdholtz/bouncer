app = 'your-bouncer-bot'
primary_region = 'ord'
kill_signal = 'SIGINT'
kill_timeout = '5s'

[build]

[env]
  BOUNCER_CONFIG = '/app/bouncer.yml'

# bouncer.yml is gitignored. Set BOUNCER_YML_B64 via:
#   fly secrets set BOUNCER_YML_B64="$(base64 < bouncer.yml)"
# then uncomment the [processes] block below.

# [processes]
#   worker = "sh -c 'echo $BOUNCER_YML_B64 | base64 -d > /app/bouncer.yml && ruby bot.rb'"

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1

[restart]
  policy = 'always'
